services:
  postgres:
    image: postgres:16-alpine
    container_name: solohandle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solohandle
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - solohandle_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solohandle"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  solohandle_pgdata:
